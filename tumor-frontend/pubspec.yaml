name: axon_vision
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- NETWORK & STORAGE ---
  http: ^1.2.0           # Saya pilih versi aman
  get_storage: ^2.1.1

  # --- STATE MANAGEMENT & NAVIGATION ---
  get: ^4.7.2            # Balik ke versi tinggi (Punya Anda)
  go_router: ^13.0.0

  # --- UI & FONTS ---
  google_fonts: ^6.3.2   # Balik ke versi tinggi
  cupertino_icons: ^1.0.8
  intl: ^0.20.0          # Wajib tinggi untuk month_year_picker

  # --- WIDGETS TAMBAHAN ---
  calendar_date_picker2: ^2.0.1  # Balik ke versi 2.0+ (Biar kodingan kalender ga error)
  month_year_picker: ^0.5.0+1
  syncfusion_flutter_datagrid: ^31.2.3 # Balik ke versi tinggi

  # --- FILE & MEDIA ---
  image_picker: ^1.2.1   # Pakai versi terbaru yang Anda punya
  file_picker: ^10.3.8   # Balik ke versi 10+ (Biar fungsi file picker jalan)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0  # Balik ke versi tinggi

flutter:
  uses-material-design: true
  assets:
    - assets/